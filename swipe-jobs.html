<style id="authGuardStyle">body{visibility:hidden!important;}</style>
<script>
// INSTANT auth check — reads Supabase session from localStorage synchronously
// No network request needed — Supabase caches session in localStorage
(function(){
  try {
    // Supabase stores session under this key pattern
    var keys = Object.keys(localStorage);
    var sessionKey = keys.find(function(k){ return k.includes('supabase') && k.includes('auth'); });
    if(sessionKey){
      var data = JSON.parse(localStorage.getItem(sessionKey));
      var session = data && (data.session || (data.currentSession));
      if(session && session.access_token){
        // Valid session found — show page
        var st = document.getElementById('authGuardStyle');
        if(st) st.textContent = '';
        return; // all good
      }
    }
  } catch(e){}
  // No session — redirect instantly (page still hidden)
  sessionStorage.setItem('redirectAfterLogin', window.location.href);
  window.location.replace('auth.html');
})();
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#0ea271;--gd:#064e38;--gl:#d6f5eb;--gm:#4ecda4;--text:#0a1a12;--mu:#4a6b58;--bg:#fff;--b2:#f4faf7;--br:rgba(14,162,113,.14);--br2:rgba(14,162,113,.28)}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--b2);color:var(--text);min-height:100vh;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 4%;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--br)}
.logo{font-family:'Fraunces',serif;font-size:22px;color:var(--text);text-decoration:none}.logo em{color:var(--g);font-style:italic}
.page{max-width:1000px;margin:0 auto;padding:76px 16px 40px;display:grid;grid-template-columns:220px 1fr 220px;gap:14px}
/* LEFT */
.panel{background:var(--bg);border:1.5px solid var(--br);border-radius:16px;padding:16px;position:sticky;top:76px;height:fit-content}
.ptitle{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{font-size:11.5px;padding:4px 11px;border-radius:100px;border:1.5px solid var(--br);background:var(--bg);color:var(--mu);cursor:pointer;font-family:inherit;transition:all .2s}
.chip.on{background:var(--gl);color:var(--gd);border-color:var(--gm)}
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--br);font-size:13px}
.srow:last-child{border:none}
.snum{font-family:'Fraunces',serif;font-size:18px;font-weight:500}
/* CENTER */
.mid{display:flex;flex-direction:column;align-items:center}
.deck{position:relative;width:100%;max-width:360px;height:500px;margin-bottom:18px}
/* CARD */
.card{position:absolute;inset:0;background:var(--bg);border-radius:20px;box-shadow:0 6px 28px rgba(0,0,0,.11);display:flex;flex-direction:column;overflow:hidden;user-select:none;-webkit-user-select:none}
.card.c1{z-index:3;cursor:grab}.card.c1:active{cursor:grabbing}
.card.c2{z-index:2;transform:scale(.96) translateY(10px);pointer-events:none}
.card.c3{z-index:1;transform:scale(.92) translateY(20px);pointer-events:none}
/* overlays */
.ov{position:absolute;font-size:15px;font-weight:800;padding:6px 14px;border-radius:100px;border:3px solid #fff;opacity:0;pointer-events:none;z-index:10;letter-spacing:.05em;transition:opacity .1s}
.ov-a{top:20px;left:14px;background:var(--g);color:#fff;transform:rotate(-12deg)}
.ov-s{top:20px;right:14px;background:#ef4444;color:#fff;transform:rotate(12deg)}
.ov-v{bottom:70px;left:50%;transform:translateX(-50%);background:#f59e0b;color:#fff}
/* card content */
.ch{padding:18px 18px 12px;border-bottom:1px solid var(--br);flex-shrink:0}
.mb{position:absolute;top:12px;right:12px;background:var(--gl);color:var(--gd);font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px}
.ci{font-size:26px;margin-bottom:8px}
.ct{font-size:18px;font-weight:700;line-height:1.2;margin-bottom:3px}
.co{font-size:12.5px;color:var(--mu);margin-bottom:8px}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 9px;border-radius:100px}
.tg{background:var(--gl);color:var(--gd)}.tb{background:#dbeeff;color:#1a5fa8}.ta{background:#fff3d6;color:#7a4e00}
.cb{padding:14px 18px;flex:1;overflow:hidden}
.sal{font-family:'Fraunces',serif;font-size:20px;color:var(--g);margin-bottom:8px}
.desc{font-size:12px;color:var(--mu);line-height:1.65;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.sks{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.sk{font-size:11px;background:var(--b2);color:var(--text);padding:2px 8px;border-radius:5px}
.cf{padding:10px 18px;border-top:1px solid var(--br);display:flex;justify-content:space-between;font-size:11.5px;color:var(--mu);flex-shrink:0}
/* BUTTONS */
.btns{display:flex;gap:12px;align-items:center;justify-content:center}
.btn{border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:all .2s;box-shadow:0 3px 10px rgba(0,0,0,.1);font-size:18px}
.btn:hover{transform:scale(1.1)}
.b-undo{width:40px;height:40px;background:var(--bg);border:2px solid var(--br2);color:var(--mu);font-size:14px}
.b-skip{width:52px;height:52px;background:var(--bg);border:2px solid #ef4444;color:#ef4444}
.b-apply{width:64px;height:64px;background:var(--g);color:#fff;box-shadow:0 4px 18px rgba(14,162,113,.4);font-size:22px}
.b-save{width:42px;height:42px;background:var(--bg);border:2px solid #f59e0b;color:#f59e0b;font-size:16px}
.hint{font-size:11px;color:var(--mu);margin-top:8px}
/* EMPTY */
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.empty h3{font-family:'Fraunces',serif;font-size:20px;margin-bottom:6px}
.empty p{font-size:12.5px;color:var(--mu);margin-bottom:14px}
.empty button{background:var(--g);color:#fff;border:none;padding:10px 22px;border-radius:100px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600}
/* RIGHT */
.ai{display:flex;gap:8px;align-items:flex-start;padding:8px;background:var(--b2);border-radius:10px;margin-bottom:7px;animation:sIn .3s ease}
@keyframes sIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
.aico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.arl{font-size:12px;font-weight:600}.aorg{font-size:11px;color:var(--mu)}
.abadge{font-size:10px;padding:1px 7px;border-radius:100px;display:inline-block;margin-top:2px}
.cbadge{background:var(--g);color:#fff;font-size:10px;font-weight:700;padding:1px 8px;border-radius:100px;margin-left:5px}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#0a1a12;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* CONFETTI */
.cw{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.c{position:absolute;border-radius:2px;animation:cf linear forwards}
@keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
/* MOBILE */
@media(max-width:700px){
  .page{grid-template-columns:1fr;padding:68px 10px 110px;gap:10px}
  .page>div:first-child,.page>div:last-child{display:none}
  .mid{width:100%;padding:0}
  .deck{height:calc(100vh - 220px);max-width:100%}
  .btns{
    position:fixed;bottom:16px;left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,.97);
    border:1.5px solid var(--br);
    border-radius:100px;
    padding:8px 18px;
    box-shadow:0 4px 24px rgba(0,0,0,.14);
    z-index:99;
    gap:14px;
  }
  .hint{display:none}
  .b-apply{width:60px;height:60px;font-size:22px}
  .b-skip{width:50px;height:50px}
  .b-save{width:40px;height:40px}
  .b-undo{width:38px;height:38px}
}
</style>

<script>
// ─────────────────────────────────────────
// ALL SWIPE LOGIC — plain script, no module
// ─────────────────────────────────────────
const SAMPLES=[
  {id:'1',title:'Biomedical Engineer',company:'Bir Hospital',location:'Kathmandu',job_type:'Full time',category:'Biomedical Engineering',salary_min:40000,salary_max:60000,description:'Maintain and calibrate ICU ventilators, imaging systems and patient monitoring devices. Ensure compliance with international biomedical standards.',skills:['ICU equipment','Ventilator','Medical devices','Calibration']},
  {id:'2',title:'Clinical Lab Technician',company:'Grande Hospital',location:'Kathmandu',job_type:'Full time',category:'Laboratory',salary_min:28000,salary_max:42000,description:'Perform hematology, biochemistry and microbiology tests. Operate automated analyzers and maintain quality control standards.',skills:['Hematology','Microbiology','PCR','Quality control']},
  {id:'3',title:'Staff Nurse (ICU)',company:'Norvic Hospital',location:'Lalitpur',job_type:'Full time',category:'Nursing',salary_min:32000,salary_max:50000,description:'Provide high quality nursing care in ICU. Monitor critically ill patients, administer medications and assist with procedures.',skills:['ICU care','Patient monitoring','IV therapy','Critical care']},
  {id:'4',title:'Radiographer',company:'Patan Hospital',location:'Lalitpur',job_type:'Full time',category:'Radiology',salary_min:28000,salary_max:45000,description:'Perform X-ray, CT scan and ultrasound procedures. Maintain imaging equipment and ensure radiation safety.',skills:['X-ray','CT scan','Ultrasound','Radiation safety']},
  {id:'5',title:'Health Program Officer',company:'WHO Nepal',location:'Kathmandu',job_type:'Contract',category:'Public Health',salary_min:80000,salary_max:120000,description:'Lead WHO public health programs across Nepal. Coordinate with government ministries, manage field teams and prepare reports.',skills:['Public health','Program management','M&E','Reporting']},
  {id:'6',title:'Pharmacist',company:'KIST Medical',location:'Kathmandu',job_type:'Full time',category:'Pharmacy',salary_min:30000,salary_max:50000,description:'Dispense medications, provide patient counseling and ensure drug safety protocols are followed.',skills:['Drug dispensing','Patient counseling','Inventory']},
  {id:'7',title:'Physiotherapist',company:'B&B Hospital',location:'Kathmandu',job_type:'Full time',category:'Physiotherapy',salary_min:28000,salary_max:45000,description:'Assess and treat patients with physical disabilities. Design and implement rehabilitation programs.',skills:['Rehabilitation','Manual therapy','Exercise therapy']},
  {id:'8',title:'Senior Biomedical Engineer',company:'Nepal Medical College',location:'Bhaktapur',job_type:'Full time',category:'Biomedical Engineering',salary_min:65000,salary_max:100000,description:'Lead the biomedical engineering department. Manage equipment procurement, maintenance teams and annual technology upgrades.',skills:['Team management','Equipment procurement','Budgeting']},
];
const ICONS={'Biomedical Engineering':'🔧','Laboratory':'🧬','Nursing':'🏥','Radiology':'🔬','Public Health':'🌍','Pharmacy':'💊','Physiotherapy':'🦾'};
const COLS=['#0ea271','#4ecda4','#d6f5eb','#dbeeff','#fff3d6','#ede9ff'];

let all=[], queue=[], idx=0, hist=[];
let nA=0,nS=0,nV=0;
let cat='';
let dragging=false,sx=0,sy=0,lx=0,ly=0;

// Load Supabase jobs in background
(function(){
  const s=document.createElement('script');
  s.src='https://esm.sh/@supabase/supabase-js@2/dist/umd/supabase.js';
  s.onload=function(){
    try{
      const {createClient}=window.supabase;
      const db=createClient('https://eteyskwaqjtcybaolnto.supabase.co','sb_publishable_iUQ7S9Z9ZNCkOQ4pJmB0Fg_kaxPNWNe');
      window._db=db;
      db.from('jobs').select('*').eq('status','active').order('created_at',{ascending:false}).then(({data})=>{
        if(data&&data.length>0){all=data;build();}
      });
    }catch(e){}
  };
  document.head.appendChild(s);
})();

function build(){
  const src=all.length>0?all:SAMPLES;
  queue=cat?src.filter(j=>j.category===cat):[...src];
  idx=0;hist=[];
  render();
}

function render(){
  const deck=document.getElementById('deck');
  document.getElementById('nR').textContent=Math.max(0,queue.length-idx);
  const vis=queue.slice(idx,idx+3);
  if(!vis.length){
    deck.innerHTML='<div class="empty"><div style="font-size:44px;margin-bottom:10px">🎉</div><h3>You\'ve seen them all!</h3><p>Went through '+queue.length+' jobs!</p><button onclick="restart()">🔄 Start over</button></div>';
    return;
  }
  deck.innerHTML='';
  // back cards
  if(vis[2]) deck.appendChild(makeCard(vis[2],'c3'));
  if(vis[1]) deck.appendChild(makeCard(vis[1],'c2'));
  // top card
  const top=makeCard(vis[0],'c1');
  deck.appendChild(top);
  dragify(top,vis[0]);
}

function makeCard(j,cls){
  const el=document.createElement('div');
  el.className='card '+cls;
  const icon=ICONS[j.category]||'🏥';
  const sal=j.salary_min?('Rs. '+Number(j.salary_min).toLocaleString()+(j.salary_max?'–'+Number(j.salary_max).toLocaleString():'+')+'/mo'):'Negotiable';
  const sks=(Array.isArray(j.skills)?j.skills:[]).slice(0,4);
  const match=65+Math.floor(Math.random()*30);
  el.innerHTML=`
<div class="ov ov-a">✓ APPLY</div>
<div class="ov ov-s">✕ SKIP</div>
<div class="ov ov-v">🔖 SAVE</div>
<div class="ch">
  <div class="mb">${match}% match</div>
  <div class="ci">${icon}</div>
  <div class="ct">${j.title}</div>
  <div class="co">🏥 ${j.company} · 📍 ${j.location||'Nepal'}</div>
  <div class="tags">
    ${j.job_type?`<span class="tag tg">${j.job_type}</span>`:''}
    ${j.category?`<span class="tag ta">${j.category}</span>`:''}
  </div>
</div>
<div class="cb">
  <div class="sal">${sal}</div>
  <div class="desc">${j.description||''}</div>
  ${sks.length?`<div class="sks">${sks.map(s=>`<span class="sk">${s}</span>`).join('')}</div>`:''}
</div>
<div class="cf">
  <span>📍 ${j.location||'Nepal'}</span>
  <span>${j.exp_level||j.job_type||'Healthcare'}</span>
</div>`;
  return el;
}

function dragify(card,job){
  // Use Hammer.js for rock-solid mobile + desktop touch/drag
  var H = new Hammer(card, {
    recognizers:[
      [Hammer.Pan, {direction: Hammer.DIRECTION_ALL, threshold: 5}],
      [Hammer.Swipe, {direction: Hammer.DIRECTION_ALL, threshold: 10, velocity: 0.3}]
    ]
  });
  H.get('pan').requireFailure(H.get('swipe'));

  var startX=0, startY=0;

  H.on('panstart', function(e){
    card.style.transition = 'none';
    startX = 0; startY = 0;
  });

  H.on('panmove', function(e){
    var dx = e.deltaX, dy = e.deltaY;
    var rot = Math.min(Math.max(dx * 0.08, -20), 20);
    card.style.transform = 'translate('+dx+'px,'+dy+'px) rotate('+rot+'deg)';
    card.querySelector('.ov-a').style.opacity = dx>40 ? Math.min(1,(dx-40)/80) : 0;
    card.querySelector('.ov-s').style.opacity = dx<-40 ? Math.min(1,(-dx-40)/80) : 0;
    card.querySelector('.ov-v').style.opacity = dy<-70 ? Math.min(1,(-dy-70)/80) : 0;
  });

  H.on('panend pancancel', function(e){
    var dx = e.deltaX, dy = e.deltaY;
    card.style.transition = 'transform .35s ease';
    if(dx > 90)       fly(card,'r', function(){ act('a',job); });
    else if(dx < -90) fly(card,'l', function(){ act('s',job); });
    else if(dy < -90) fly(card,'u', function(){ act('v',job); });
    else              card.style.transform = '';
    card.querySelectorAll('.ov').forEach(function(o){ o.style.opacity=0; });
  });

  H.on('swipeleft',  function(){ fly(card,'l', function(){ act('s',job); }); });
  H.on('swiperight', function(){ fly(card,'r', function(){ act('a',job); }); });
  H.on('swipeup',    function(){ fly(card,'u', function(){ act('v',job); }); });
}

function fly(card,dir,cb){
  const w=window.innerWidth+300,h=window.innerHeight+300;
  const tx=dir==='r'?w:dir==='l'?-w:0;
  const ty=dir==='u'?-h:0;
  const rot=dir==='r'?25:dir==='l'?-25:0;
  card.style.transition='transform .4s cubic-bezier(.25,.46,.45,.94)';
  card.style.transform=`translate(${tx}px,${ty}px) rotate(${rot}deg)`;
  setTimeout(()=>{cb();},380);
}

function act(type,job){
  hist.push({type,job,idx});
  idx++;
  if(type==='a'){
    nA++;
    addList('lA','cA',job,'var(--gl)','var(--gd)','Applied ✓');
    saveDB(job);
    confetti();
    toast('✅ Applied to '+job.title+'!','#0ea271');
  } else if(type==='s'){
    nS++;
    toast('Skipped','#666');
  } else {
    nV++;
    addList('lV','cV',job,'#fff3d6','#7a4e00','Saved 🔖');
    toast('🔖 Saved '+job.title,'#f59e0b');
  }
  document.getElementById('nA').textContent=nA;
  document.getElementById('nS').textContent=nS;
  document.getElementById('nV').textContent=nV;
  render();
}

function addList(lid,cid,job,bg,color,label){
  const l=document.getElementById(lid);
  if(l.querySelector('div[style]')) l.innerHTML='';
  const icon=ICONS[job.category]||'🏥';
  const el=document.createElement('div');
  el.className='ai';
  el.innerHTML=`<div class="aico" style="background:${bg}">${icon}</div><div><div class="arl">${job.title}</div><div class="aorg">${job.company}</div><span class="abadge" style="background:${bg};color:${color}">${label}</span></div>`;
  l.insertBefore(el,l.firstChild);
  document.getElementById(cid).textContent=lid==='lA'?nA:nV;
}

function undo(){
  if(!hist.length){toast('Nothing to undo','#666');return;}
  const last=hist.pop();
  idx=last.idx;
  if(last.type==='a'){nA=Math.max(0,nA-1);const l=document.getElementById('lA');if(l.firstElementChild&&l.firstElementChild.classList.contains('ai'))l.removeChild(l.firstElementChild);document.getElementById('cA').textContent=nA;}
  if(last.type==='v'){nV=Math.max(0,nV-1);const l=document.getElementById('lV');if(l.firstElementChild&&l.firstElementChild.classList.contains('ai'))l.removeChild(l.firstElementChild);document.getElementById('cV').textContent=nV;}
  if(last.type==='s') nS=Math.max(0,nS-1);
  document.getElementById('nA').textContent=nA;
  document.getElementById('nS').textContent=nS;
  document.getElementById('nV').textContent=nV;
  render();
  toast('↩ Undone!','#4a6b58');
}

function swipe(type){
  const top=document.querySelector('.card.c1');
  if(!top) return;
  const job=queue[idx];
  if(!job) return;
  const ov=top.querySelector('.ov-'+({'a':'a','s':'s','v':'v'}[type]));
  if(ov) ov.style.opacity='1';
  const dir=type==='a'?'r':type==='s'?'l':'u';
  setTimeout(()=>fly(top,dir,()=>act(type,job)),50);
}

function restart(){cat='';document.querySelectorAll('.chip').forEach(c=>{c.classList.toggle('on',!c.dataset.cat)});build();}

async function saveDB(job){
  if(!window._db) return;
  try{
    const {data:{session}}=await window._db.auth.getSession();
    if(!session) return;
    await window._db.from('applications').insert([{job_id:job.id,applicant_id:session.user.id,status:'applied',cover_letter:'Applied via Swipe'}]);
  }catch(e){}
}

function confetti(){
  const w=document.getElementById('cw');
  for(let i=0;i<28;i++){
    const c=document.createElement('div');
    c.className='c';
    const sz=6+Math.random()*8;
    c.style.cssText=`left:${Math.random()*100}%;top:-10px;width:${sz}px;height:${sz}px;background:${COLS[Math.floor(Math.random()*COLS.length)]};animation-duration:${.8+Math.random()*.7}s;animation-delay:${Math.random()*.3}s`;
    w.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

function toast(msg,bg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=bg||'#0a1a12';
  t.classList.add('on');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('on'),2200);
}

// Wire up buttons
document.getElementById('bApply').onclick=()=>swipe('a');
document.getElementById('bSkip').onclick=()=>swipe('s');
document.getElementById('bSave').onclick=()=>swipe('v');
document.getElementById('bUndo').onclick=()=>undo();

// Category chips
document.getElementById('chips').addEventListener('click',e=>{
  const b=e.target.closest('.chip');
  if(!b) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  b.classList.add('on');
  cat=b.dataset.cat;
  build();
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') swipe('a');
  else if(e.key==='ArrowLeft') swipe('s');
  else if(e.key==='ArrowUp') swipe('v');
  else if(e.key==='z'||e.key==='Z') undo();
});

// Init
build();
</script>
</body>
</html>
