<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My Profile — Talentry</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--g:#0ea271;--gd:#064e38;--bg:#f4faf7;--text:#0a1a12;--muted:#4a6b58;--border:rgba(14,162,113,.18);--white:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.container{max-width:680px;margin:0 auto;padding:24px 16px 60px;}
.page-title{font-family:Fraunces,serif;font-size:28px;margin-bottom:4px;}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:24px;}
.card{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:24px;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:16px;text-transform:uppercase;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:border .2s;}
.field input:focus,.field textarea:focus{border-color:var(--g);}
.field textarea{resize:vertical;min-height:100px;line-height:1.6;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.save-btn{width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;}
.save-btn:hover{background:var(--gd);transform:translateY(-1px);}
.save-btn:disabled{background:var(--muted);cursor:not-allowed;transform:none;}
.avatar{width:72px;height:72px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin-bottom:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gd);color:#fff;padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;z-index:9999;display:none;}
.toast.show{display:block;}
.locked-field{background:#f4faf7;color:var(--text);cursor:not-allowed;border-color:rgba(14,162,113,.25) !important;}
.locked-label{display:inline-flex;align-items:center;gap:6px;}
.locked-badge{font-size:11px;background:#d6f5eb;color:#064e38;padding:2px 8px;border-radius:100px;font-weight:600;}
</style>
</head>
<body>
<script>
(function(){
  try{
    const k='sb-eteyskwaqjtcybaolnto-auth-token';
    const d=JSON.parse(localStorage.getItem(k)||'{}');
    if(!d.access_token&&!d.user){window.location.replace('auth.html');}
  }catch(e){window.location.replace('auth.html');}
})();
</script>

<script type="module" src="navbar.js"></script>

<div class="container" style="margin-top:80px;">
  <h1 class="page-title">My Profile</h1>
  <p class="page-sub">Your info is used across Talentry — keep it updated!</p>

  <div id="profileContent"><div style="text-align:center;padding:40px;color:var(--muted);">⏳ Loading profile...</div></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const sb = window.supabase.createClient(
  'https://eteyskwaqjtcybaolnto.supabase.co',
  'sb_publishable_iUQ7S9Z9ZNCkOQ4pJmB0Fg_kaxPNWNe'
);
window._sb = sb;

function toast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#064e38' : '#dc2626';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

(async function init() {
  const {data:{session}} = await sb.auth.getSession();
  if (!session) { window.location.replace('auth.html'); return; }

  const userId = session.user.id;
  const userEmail = session.user.email;

  // Load profile
  const {data:p} = await sb.from('profiles').select('*').eq('id', userId).single();

  const initials = (p?.full_name || userEmail).substring(0,2).toUpperCase();
  const isEmployer = p?.role === 'employer';

  document.getElementById('profileContent').innerHTML = `
    <div class="card">
      <div class="avatar">${initials}</div>
      <div class="card-title">Account Info</div>
      <div class="field">
        <label class="locked-label">Email <span class="locked-badge">🔒 Cannot change</span></label>
        <input class="locked-field" readonly value="${userEmail}"/>
      </div>
      <div class="field">
        <label class="locked-label">Role <span class="locked-badge">🔒 Fixed</span></label>
        <input class="locked-field" readonly value="${isEmployer ? '🏥 Employer' : '👤 Job Seeker'}"/>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Personal Information</div>
      <div class="field">
        <label>Full name *</label>
        <input id="fullName" type="text" value="${p?.full_name||''}" placeholder="Ram Bahadur Shrestha"/>
      </div>
      <div class="row">
        <div class="field">
          <label>Phone number</label>
          <input id="phone" type="tel" value="${p?.phone||''}" placeholder="+977 98XXXXXXXX"/>
        </div>
        <div class="field">
          <label>Location</label>
          <input id="location" type="text" value="${p?.location||''}" placeholder="Kathmandu, Nepal"/>
        </div>
      </div>
      ${isEmployer ? `
      <div class="field">
        <label>Company / Hospital name</label>
        <input id="companyName" type="text" value="${p?.company_name||''}" placeholder="Bir Hospital"/>
      </div>` : `
      <div class="field">
        <label>Current job title</label>
        <input id="jobTitle" type="text" value="${p?.job_title||''}" placeholder="Biomedical Engineer"/>
      </div>
      <div class="field">
        <label>Years of experience</label>
        <select id="yearsExp">
          <option value="">Select...</option>
          ${['Fresh graduate','Less than 1 year','1-2 years','3-5 years','5-10 years','10+ years'].map(y=>`<option value="${y}" ${p?.years_experience===y?'selected':''}>${y}</option>`).join('')}
        </select>
      </div>`}
    </div>

    ${!isEmployer ? `
    <div class="card">
      <div class="card-title">Professional Summary</div>
      <div class="field">
        <label>Bio / About me</label>
        <textarea id="bio" placeholder="Write a short summary about your experience, skills and goals...">${p?.bio||''}</textarea>
      </div>
      <div class="field">
        <label>Key skills (comma separated)</label>
        <input id="skills" type="text" value="${p?.skills||''}" placeholder="Medical devices, ICU equipment, Ventilator servicing"/>
      </div>
      <div class="field">
        <label>LinkedIn profile URL</label>
        <input id="linkedin" type="url" value="${p?.linkedin||''}" placeholder="https://linkedin.com/in/yourname"/>
      </div>
    </div>` : ''}

    <button class="save-btn" id="saveBtn" onclick="saveProfile('${userId}')">💾 Save profile</button>
  `;
})();

async function saveProfile(userId) {
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ Saving...';
  btn.disabled = true;

  const updates = {
    full_name: document.getElementById('fullName')?.value?.trim() || '',
    phone: document.getElementById('phone')?.value?.trim() || '',
    location: document.getElementById('location')?.value?.trim() || '',
    company_name: document.getElementById('companyName')?.value?.trim() || null,
    job_title: document.getElementById('jobTitle')?.value?.trim() || null,
    years_experience: document.getElementById('yearsExp')?.value || null,
    bio: document.getElementById('bio')?.value?.trim() || null,
    skills: document.getElementById('skills')?.value?.trim() || null,
    linkedin: document.getElementById('linkedin')?.value?.trim() || null,
  };

  const {error} = await sb.from('profiles').update(updates).eq('id', userId);

  if (error) {
    toast('❌ Error saving: ' + error.message, false);
  } else {
    toast('✅ Profile saved successfully!');
  }

  btn.textContent = '💾 Save profile';
  btn.disabled = false;
}
window.saveProfile = saveProfile;
</script>
</body>
</html>
